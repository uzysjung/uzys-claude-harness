name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: TypeScript CI (typecheck + lint + test:coverage + build)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Show versions
        run: |
          node --version
          npm --version

      - name: Run CI pipeline
        run: npm run ci

      - name: Smoke test (install --track tooling into temp dir)
        shell: bash
        run: |
          tmp=$(mktemp -d)
          node dist/index.js install --track tooling --project-dir "$tmp"
          test -f "$tmp/.claude/CLAUDE.md"
          test -f "$tmp/.claude/.installed-tracks"
          test -f "$tmp/.mcp.json"
          rm -rf "$tmp"
